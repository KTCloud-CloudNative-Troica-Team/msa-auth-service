# Base 설정. 환경별 application-{dev,prod}.yaml이 덮어쓴다.
spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:7007}/${AUTH_DB_NAME:auth_db}
    username: ${AUTH_DB_USERNAME:auth-service}
    password: ${AUTH_DB_PASSWORD:auth-service}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:7006}
      password: ${REDIS_PASSWORD:auth-service}

# JWT secret — 반드시 환경변수 ${JWT_SECRET}으로 주입 (Phase 5에서 ExternalSecrets로 정식 운영).
# fallback 값은 명백한 placeholder. 운영에서 이 값이 사용되면 즉시 인지 + 거부 가능하도록.
# (R-25 Phase 1 fix: 모노레포의 실제 평문 secret을 placeholder로 치환. git history엔 남지만
# 향후 CI 또는 컨테이너 startup gate가 placeholder 거부 가능.)
jwt:
  secret: ${JWT_SECRET:DEV_ONLY_INSECURE_REPLACE_ME_WITH_REAL_SECRET}

server:
  port: ${SERVER_PORT:8005}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9005}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, prometheus
      path-mapping:
        health: healthz
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
